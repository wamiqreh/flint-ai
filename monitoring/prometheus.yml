# Prometheus scrape configuration for flint-ai
# Used by docker-compose.monitoring.yml

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # Flint API — exposes /metrics on port 5156
  - job_name: "flint-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["flint-api:5156"]
        labels:
          service: "flint-api"
          pod: "flint-api-1"
      - targets: ["flint-api-2:5156"]
        labels:
          service: "flint-api"
          pod: "flint-api-2"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
