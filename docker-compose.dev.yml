# Development mode — zero external dependencies
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# In-memory queue and task store, no Redis or Postgres required.
# Perfect for a quick first run or local feature development.

services:
  flint-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5156"
      USE_INMEMORY_QUEUE: "true"
      # Empty connection string → in-memory task & workflow stores
      ConnectionStrings__DefaultConnection: ""
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    ports:
      - "5156:5156"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5156/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
