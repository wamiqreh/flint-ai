# Ingress with TLS — routes external traffic to the API service.
# Requires an Ingress controller (e.g., nginx-ingress) and cert-manager
# for automatic TLS certificate provisioning.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orchestrator-ingress
  labels:
    app: orchestrator-api
  annotations:
    # nginx ingress controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Rate limiting (60 req/min per IP — matches free tier)
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    # cert-manager for automatic TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - orchestrator.example.com
      secretName: orchestrator-tls
  rules:
    - host: orchestrator.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-api
                port:
                  number: 80
