apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-worker
  labels:
    app: orchestrator-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator-worker
  template:
    metadata:
      labels:
        app: orchestrator-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5156"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: orchestrator-worker
          image: flint-ai:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "flint_ai.server"]
          args: ["--host", "0.0.0.0", "--port", "5156"]
          ports:
            - containerPort: 5156
              name: http
          envFrom:
            - configMapRef:
                name: orchestrator-config
            - secretRef:
                name: orchestrator-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
