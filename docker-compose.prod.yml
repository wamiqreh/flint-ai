# Production setup — full stack with Redis, Postgres, API, and Worker
# Usage: cp .env.example .env   # edit values first
#        docker compose -f docker-compose.prod.yml up -d

services:
  flint-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:5156"
      REDIS_CONNECTION: "redis:6379"
      REDIS_CONSUMER_GROUP: "${REDIS_CONSUMER_GROUP:-flint-group}"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-orchestrator};Username=${POSTGRES_USER:-orchestrator};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      ORCHESTRATOR_API_KEY: "${ORCHESTRATOR_API_KEY:?ORCHESTRATOR_API_KEY is required}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
    ports:
      - "${API_PORT:-5156}:5156"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5156/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    networks:
      - flint-net

  flint-worker:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - ./:/src:ro
    working_dir: /src
    environment:
      REDIS_CONNECTION: "redis:6379"
      REDIS_CONSUMER_GROUP: "${REDIS_CONSUMER_GROUP:-flint-group}"
      REDIS_RECLAIM_MIN_IDLE_MS: "${REDIS_RECLAIM_MIN_IDLE_MS:-60000}"
      POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-orchestrator};Username=${POSTGRES_USER:-orchestrator};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    command: bash -lc "dotnet restore && dotnet run --project src/Orchestrator.Worker --configuration Release"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:1234/metrics || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - flint-net

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flint-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-orchestrator}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_DB: "${POSTGRES_DB:-orchestrator}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - flint-net

volumes:
  redis-data:
  postgres-data:

networks:
  flint-net:
    driver: bridge
