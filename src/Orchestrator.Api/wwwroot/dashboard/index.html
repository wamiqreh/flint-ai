<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Flint — Task Orchestrator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;line-height:1.5}

/* ── Header ─────────────────────────────────────────── */
header{background:#161b22;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #30363d;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand svg{width:22px;height:22px}
.brand h1{font-size:1.15rem;font-weight:700;color:#f0f6fc;letter-spacing:-.02em}
.brand h1 span{color:#58a6ff;font-weight:400;font-size:.8rem;margin-left:6px;opacity:.7}
.header-controls{display:flex;align-items:center;gap:14px;font-size:.82rem}
.status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px}
.status-dot.ok{background:#3fb950}.status-dot.err{background:#f85149}
select{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:4px 8px;border-radius:6px;font-size:.82rem;cursor:pointer}
select:focus{outline:1px solid #58a6ff}
button,.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;transition:background .15s,border-color .15s}
button:hover,.btn:hover{background:#30363d;border-color:#484f58}
.btn-primary{background:#238636;border-color:#2ea043;color:#fff}
.btn-primary:hover{background:#2ea043;border-color:#3fb950}
.btn-danger{background:rgba(248,81,73,.15);border-color:#f85149;color:#f85149}
.btn-danger:hover{background:rgba(248,81,73,.25)}
.btn-sm{padding:3px 10px;font-size:.75rem}

/* ── Toast / Flash ──────────────────────────────────── */
#toast{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-msg{background:#161b22;border:1px solid #3fb950;color:#3fb950;padding:8px 16px;border-radius:8px;font-size:.82rem;font-weight:600;opacity:0;transform:translateY(-8px);animation:toastIn .3s ease forwards}
.toast-msg.error{border-color:#f85149;color:#f85149}
@keyframes toastIn{to{opacity:1;transform:translateY(0)}}

/* ── Main layout ────────────────────────────────────── */
main{padding:20px;max-width:1440px;margin:0 auto}

/* ── Metric cards ───────────────────────────────────── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:20px}
.card{background:#161b22;border-radius:8px;padding:16px 18px;border:1px solid #30363d;transition:border-color .2s}
.card:hover{border-color:#484f58}
.card-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:#8b949e;margin-bottom:6px}
.card-value{font-size:1.75rem;font-weight:700;color:#f0f6fc}
.card-sub{font-size:.72rem;color:#8b949e;margin-top:4px}

/* ── Panels ─────────────────────────────────────────── */
.panel{background:#161b22;border-radius:8px;border:1px solid #30363d;overflow:hidden;margin-bottom:20px}
.panel-hdr{padding:12px 16px;background:#161b22;border-bottom:1px solid #30363d;font-weight:600;font-size:.9rem;display:flex;justify-content:space-between;align-items:center}
.panel-body{padding:0;max-height:520px;overflow-y:auto}
.panel-body::-webkit-scrollbar{width:6px}
.panel-body::-webkit-scrollbar-track{background:#0d1117}
.panel-body::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.two-col{display:grid;grid-template-columns:repeat(auto-fit,minmax(440px,1fr));gap:16px}

/* ── Task Activity filter tabs ──────────────────────── */
.filter-tabs{display:flex;gap:2px;padding:12px 16px 0 16px;flex-wrap:wrap}
.filter-tab{padding:5px 14px;font-size:.78rem;border-radius:6px;cursor:pointer;border:1px solid transparent;color:#8b949e;background:transparent;transition:all .15s;font-weight:500}
.filter-tab:hover{color:#c9d1d9;background:#21262d}
.filter-tab.active{background:#21262d;color:#f0f6fc;border-color:#30363d}
.filter-tab .tab-count{background:#30363d;color:#8b949e;padding:1px 6px;border-radius:10px;font-size:.7rem;margin-left:4px}
.filter-tab.active .tab-count{background:#484f58;color:#c9d1d9}

/* ── Tables ─────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{text-align:left;padding:8px 12px;border-bottom:1px solid #30363d;color:#8b949e;font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;position:sticky;top:0;background:#161b22;z-index:1}
td{padding:8px 12px;border-bottom:1px solid #21262d}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:#1c2128}
.task-detail-row{background:#0d1117}
.task-detail-row td{padding:12px 16px 12px 32px}
.detail-block{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:12px;font-family:'SFMono-Regular',Consolas,monospace;font-size:.78rem;color:#8b949e;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin-top:6px}
.detail-label{font-size:.72rem;text-transform:uppercase;color:#58a6ff;font-weight:600;letter-spacing:.04em}

/* ── State badges ───────────────────────────────────── */
.badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.badge-queued{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.badge-running{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid rgba(59,130,246,.3);animation:pulse-running 2s ease-in-out infinite}
.badge-succeeded{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
.badge-failed{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.badge-deadletter{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.badge-cancel{background:rgba(139,148,158,.15);color:#8b949e;border:1px solid rgba(139,148,158,.3)}
.badge-pending{background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.3);animation:pulse-running 2s ease-in-out infinite}
.badge-count{background:#30363d;color:#8b949e;font-size:.72rem;padding:2px 8px;border-radius:10px}
.badge-warn{background:rgba(248,81,73,.15);color:#f85149;border:1px solid rgba(248,81,73,.3)}
@keyframes pulse-running{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Action buttons ──────────────────────────────────── */
.btn-approve{background:rgba(34,197,94,.15);border-color:#22c55e;color:#22c55e}
.btn-approve:hover{background:rgba(34,197,94,.3)}
.btn-reject{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}
.btn-reject:hover{background:rgba(239,68,68,.3)}
.btn-restart{background:rgba(59,130,246,.15);border-color:#3b82f6;color:#3b82f6}
.btn-restart:hover{background:rgba(59,130,246,.3)}
.btn[disabled],.btn-sm[disabled]{opacity:.5;cursor:not-allowed;pointer-events:none}
.action-group{display:flex;gap:4px;align-items:center}

/* ── Live streaming indicator ────────────────────────── */
.btn-live{background:rgba(88,166,255,.15);border-color:#58a6ff;color:#58a6ff;position:relative}
.btn-live:hover{background:rgba(88,166,255,.3)}
.btn-live.streaming{background:rgba(63,185,80,.2);border-color:#3fb950;color:#3fb950;animation:livePulse 1.5s ease-in-out infinite}
.btn-live.streaming::before{content:'';position:absolute;top:3px;left:6px;width:6px;height:6px;border-radius:50%;background:#3fb950}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
.live-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.7rem;font-weight:700;margin-left:4px;vertical-align:middle}
.live-badge-running{background:rgba(210,153,34,.2);color:#d2992a}
.live-badge-succeeded{background:rgba(63,185,80,.2);color:#3fb950}
.live-badge-failed{background:rgba(248,81,73,.2);color:#f85149}

/* ── Approval banner ─────────────────────────────────── */
.approval-banner{background:rgba(249,115,22,.1);border-bottom:1px solid rgba(249,115,22,.3);padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:.84rem;font-weight:600;color:#f97316}
.approval-banner .banner-icon{font-size:1.1rem}

/* ── Agent bars ─────────────────────────────────────── */
.bar-wrap{margin:8px 16px}
.bar-label{font-size:.82rem;margin-bottom:4px;display:flex;justify-content:space-between;color:#c9d1d9}
.bar-bg{background:#21262d;border-radius:4px;height:22px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
.bar-green{background:#3fb950}.bar-yellow{background:#d29922}.bar-red{background:#f85149}

/* ── Misc ───────────────────────────────────────────── */
.empty{color:#484f58;font-style:italic;padding:20px 16px;text-align:center}
.mono{font-family:'SFMono-Regular',Consolas,monospace;font-size:.78rem}
.text-muted{color:#8b949e}
.node-row{background:#0d1117}
.node-row td{padding:5px 12px 5px 32px;font-size:.78rem;color:#8b949e}
.wf-actions{display:flex;gap:6px;align-items:center}

@media(max-width:600px){
  .two-col{grid-template-columns:1fr}
  .cards{grid-template-columns:repeat(2,1fr)}
  .filter-tabs{padding:8px 12px 0 12px}
  th,td{padding:6px 8px}
}
</style>
</head>
<body>

<!-- Toast container -->
<div id="toast"></div>

<header>
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
    <h1>Flint <span>Orchestrator</span></h1>
  </div>
  <div class="header-controls">
    <span><span id="statusDot" class="status-dot ok"></span><span id="statusTxt">Connected</span></span>
    <label>Poll
      <select id="intervalSel">
        <option value="2000">2 s</option>
        <option value="5000" selected>5 s</option>
        <option value="10000">10 s</option>
        <option value="30000">30 s</option>
      </select>
    </label>
    <button id="toggleBtn" onclick="toggleRefresh()">&#10074;&#10074; Pause</button>
  </div>
</header>

<main>
  <!-- ── Metric Cards ───────────────────────────────── -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Total Tasks</div>
      <div class="card-value" id="cTasks">—</div>
      <div class="card-sub" id="cTasksSub"></div>
    </div>
    <div class="card">
      <div class="card-label">Active Tasks</div>
      <div class="card-value" id="cActive">—</div>
      <div class="card-sub" id="cActiveSub"></div>
    </div>
    <div class="card">
      <div class="card-label">Workflows</div>
      <div class="card-value" id="cWf">—</div>
    </div>
    <div class="card">
      <div class="card-label">Agent Slots</div>
      <div class="card-value" id="cSlots">—</div>
    </div>
    <div class="card">
      <div class="card-label">DLQ Size</div>
      <div class="card-value" id="cDlq">—</div>
    </div>
  </div>

  <!-- ── Task Activity (hero section) ───────────────── -->
  <div class="panel" id="taskPanel">
    <div class="panel-hdr">
      <span>&#9889; Task Activity</span>
      <span class="badge badge-count" id="taskTotal">0</span>
    </div>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-state="All">All <span class="tab-count" id="tcAll">0</span></button>
      <button class="filter-tab" data-state="Queued">Queued <span class="tab-count" id="tcQueued">0</span></button>
      <button class="filter-tab" data-state="Running">Running <span class="tab-count" id="tcRunning">0</span></button>
      <button class="filter-tab" data-state="Succeeded">Succeeded <span class="tab-count" id="tcSucceeded">0</span></button>
      <button class="filter-tab" data-state="Failed">Failed <span class="tab-count" id="tcFailed">0</span></button>
      <button class="filter-tab" data-state="Pending">✋ Pending <span class="tab-count" id="tcPending">0</span></button>
      <button class="filter-tab" data-state="DeadLetter">DLQ <span class="tab-count" id="tcDeadLetter">0</span></button>
    </div>
    <div id="approvalBanner" style="display:none"></div>
    <div class="panel-body" id="taskBody" style="max-height:560px">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- ── Two-column: Agents + Workflows ─────────────── -->
  <div class="two-col">
    <div class="panel">
      <div class="panel-hdr">Agent Concurrency</div>
      <div class="panel-body" id="agentPanel" style="padding:8px 0"><div class="empty">Loading…</div></div>
    </div>
    <div class="panel">
      <div class="panel-hdr">Workflows <span id="wfCount" class="badge badge-count"></span></div>
      <div class="panel-body" id="wfPanel"><div class="empty">Loading…</div></div>
    </div>
  </div>

  <!-- ── DLQ Panel ──────────────────────────────────── -->
  <div class="panel" id="dlqPanel">
    <div class="panel-hdr" style="display:flex;justify-content:space-between;align-items:center">
      <span>💀 Dead Letter Queue <span id="dlqBadge"></span></span>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="dlqFilter" onchange="filterDlq()" style="background:var(--card-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:2px 8px;font-size:12px">
          <option value="all">All Agents</option>
        </select>
        <button class="btn btn-sm" style="background:var(--amber);color:#000;font-size:11px;padding:2px 10px" onclick="restartAllDlq()">🔄 Restart All</button>
      </div>
    </div>
    <div class="panel-body" id="dlqBody"><div class="empty">Loading…</div></div>
  </div>
</main>

<script>
/* ── State ──────────────────────────────────────────── */
let refreshId = null, paused = false, expandedWf = {}, expandedTask = {};
let taskFilter = 'All';
window._taskCache = [];
window._wfCache = [];
window._wfTaskCounts = {};

const $ = id => document.getElementById(id);

/* ── Toast notifications ────────────────────────────── */
function toast(msg, isError) {
  const el = document.createElement('div');
  el.className = 'toast-msg' + (isError ? ' error' : '');
  el.textContent = msg;
  $('toast').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; }, 2200);
  setTimeout(() => el.remove(), 2600);
}

/* ── Connection indicator ───────────────────────────── */
function setConnected(ok) {
  $('statusDot').className = 'status-dot ' + (ok ? 'ok' : 'err');
  $('statusTxt').textContent = ok ? 'Connected' : 'Disconnected';
}

/* ── API helper ─────────────────────────────────────── */
async function api(url, opts) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(r.status);
  return r;
}

/* ── SSE task streaming ────────────────────────────── */
var _activeStreams = {};

function streamTask(taskId) {
  if (_activeStreams[taskId]) {
    _activeStreams[taskId].close();
    delete _activeStreams[taskId];
    var btn = document.getElementById('live-' + taskId);
    if (btn) { btn.classList.remove('streaming'); btn.innerHTML = '📡 Live'; }
    return;
  }
  var source = new EventSource('/tasks/' + taskId + '/stream');
  _activeStreams[taskId] = source;
  var btn = document.getElementById('live-' + taskId);
  if (btn) { btn.classList.add('streaming'); btn.innerHTML = '● Live'; }

  source.addEventListener('status', function(e) {
    var data = JSON.parse(e.data);
    var badge = document.getElementById('live-status-' + taskId);
    if (badge) {
      var s = (data.status || '').toLowerCase();
      badge.className = 'live-badge live-badge-' + s;
      badge.textContent = data.status;
      badge.style.display = '';
    }
    var row = document.querySelector('[data-task-id="' + taskId + '"]');
    if (row) {
      var stateCell = row.querySelector('.task-state');
      if (stateCell) stateCell.innerHTML = stateBadge(data.status);
    }
  });

  source.addEventListener('complete', function(e) {
    source.close();
    delete _activeStreams[taskId];
    if (btn) { btn.classList.remove('streaming'); btn.innerHTML = '📡 Live'; }
    var badge = document.getElementById('live-status-' + taskId);
    if (badge) {
      var data = JSON.parse(e.data);
      var s = (data.status || '').toLowerCase();
      badge.className = 'live-badge live-badge-' + s;
      badge.textContent = data.status;
    }
    refresh();
  });

  source.addEventListener('timeout', function() {
    source.close();
    delete _activeStreams[taskId];
    if (btn) { btn.classList.remove('streaming'); btn.innerHTML = '📡 Live'; }
    var badge = document.getElementById('live-status-' + taskId);
    if (badge) badge.style.display = 'none';
  });

  source.onerror = function() {
    source.close();
    delete _activeStreams[taskId];
    if (btn) { btn.classList.remove('streaming'); btn.innerHTML = '📡 Live'; }
  };
}

/* ── Relative time ──────────────────────────────────── */
function relTime(dateStr) {
  if (!dateStr) return '—';
  const diff = (Date.now() - new Date(dateStr).getTime()) / 1000;
  if (diff < 0) return 'just now';
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

/* ── Escape HTML ────────────────────────────────────── */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── State badge class ──────────────────────────────── */
function stateBadge(state) {
  const s = (state || '').toLowerCase();
  const map = { queued:'badge-queued', running:'badge-running', succeeded:'badge-succeeded',
                failed:'badge-failed', deadletter:'badge-deadletter', cancelled:'badge-cancel',
                pending:'badge-pending' };
  const icons = { pending:'✋ ' };
  return `<span class="badge ${map[s] || 'badge-cancel'}">${icons[s] || ''}${esc(state)}</span>`;
}

/* ── Task Activity ──────────────────────────────────── */
function renderTasks(tasks) {
  const list = Array.isArray(tasks) ? tasks : [];
  window._taskCache = list;

  // Counts per state
  const counts = { All: list.length, Queued: 0, Running: 0, Succeeded: 0, Failed: 0, DeadLetter: 0, Pending: 0 };
  list.forEach(t => {
    const s = t.state || t.State || '';
    if (counts[s] !== undefined) counts[s]++;
  });
  $('tcAll').textContent = counts.All;
  $('tcQueued').textContent = counts.Queued;
  $('tcRunning').textContent = counts.Running;
  $('tcSucceeded').textContent = counts.Succeeded;
  $('tcFailed').textContent = counts.Failed;
  $('tcDeadLetter').textContent = counts.DeadLetter;
  $('tcPending').textContent = counts.Pending;
  $('taskTotal').textContent = counts.All;

  // Approval banner
  if (counts.Pending > 0) {
    $('approvalBanner').style.display = '';
    $('approvalBanner').innerHTML = `<div class="approval-banner"><span class="banner-icon">⚠️</span> ${counts.Pending} task${counts.Pending > 1 ? 's' : ''} awaiting human approval</div>`;
  } else {
    $('approvalBanner').style.display = 'none';
    $('approvalBanner').innerHTML = '';
  }

  // Metric cards from task data
  $('cTasks').textContent = list.length;
  const succ = counts.Succeeded, fail = counts.Failed, run = counts.Running, queued = counts.Queued;
  $('cTasksSub').textContent = list.length ? `${succ} ✓  ${fail} ✗  ${run} ⏳  ${queued} queued` : '';
  const activeCount = run + queued;
  $('cActive').textContent = activeCount;
  $('cActiveSub').textContent = activeCount ? `${run} running · ${queued} queued` : 'idle';

  // Compute per-workflow task counts
  window._wfTaskCounts = {};
  list.forEach(t => {
    const wid = t.workflowId || t.WorkflowId;
    if (wid) window._wfTaskCounts[wid] = (window._wfTaskCounts[wid] || 0) + 1;
  });

  // Filter
  const filtered = taskFilter === 'All' ? list : list.filter(t => (t.state || t.State) === taskFilter);

  if (!filtered.length) {
    $('taskBody').innerHTML = `<div class="empty">${list.length ? 'No ' + taskFilter.toLowerCase() + ' tasks' : 'No tasks yet — submit one!'}</div>`;
    return;
  }

  let html = '<table><tr><th>Task ID</th><th>Agent</th><th>State</th><th>Workflow</th><th>Prompt</th><th>Created</th><th>Actions</th></tr>';
  filtered.forEach(t => {
    const id = t.id || t.Id || '';
    const shortId = id.substring(0, 8);
    const agent = t.agentType || t.AgentType || '—';
    const state = t.state || t.State || '—';
    const wfId = t.workflowId || t.WorkflowId || '—';
    const prompt = esc((t.prompt || t.Prompt || '').substring(0, 50));
    const created = relTime(t.createdAt || t.CreatedAt);
    const isOpen = expandedTask[id];
    const canCancel = state === 'Queued' || state === 'Running';
    const canRestart = state === 'Failed' || state === 'DeadLetter';
    const isPending = state === 'Pending';

    html += `<tr class="clickable" data-task-id="${esc(id)}" onclick="toggleTask('${esc(id)}')">`;
    html += `<td class="mono">${isOpen ? '&#9660;' : '&#9654;'} ${esc(shortId)}</td>`;
    html += `<td>${esc(agent)}</td>`;
    html += `<td class="task-state">${stateBadge(state)}<span id="live-status-${esc(id)}" class="live-badge" style="display:none"></span></td>`;
    html += `<td class="mono">${esc(wfId === '—' ? '—' : wfId.substring(0, 8))}</td>`;
    html += `<td>${prompt}${(t.prompt || t.Prompt || '').length > 50 ? '…' : ''}</td>`;
    html += `<td class="text-muted">${created}</td>`;
    html += `<td><div class="action-group">`;
    const isTerminal = state === 'Succeeded' || state === 'Failed' || state === 'DeadLetter';
    if (!isTerminal) {
      const isStreaming = !!_activeStreams[id];
      html += `<button id="live-${esc(id)}" class="btn btn-live btn-sm${isStreaming ? ' streaming' : ''}" onclick="streamTask('${esc(id)}');event.stopPropagation()">${isStreaming ? '● Live' : '📡 Live'}</button>`;
    }
    if (isPending) {
      html += `<button class="btn btn-approve btn-sm" onclick="approveTask('${esc(id)}','${esc(wfId)}','${esc(agent)}',event)">✓ Approve</button>`;
      html += `<button class="btn btn-reject btn-sm" onclick="rejectTask('${esc(id)}','${esc(wfId)}','${esc(agent)}',event)">✗ Reject</button>`;
    }
    if (canCancel) html += `<button class="btn btn-danger btn-sm" onclick="cancelTask('${esc(id)}',event)">✕ Cancel</button>`;
    if (canRestart) html += `<button class="btn btn-restart btn-sm" onclick="restartTask('${esc(id)}',event)">🔄 Restart</button>`;
    html += `</div></td>`;
    html += '</tr>';

    if (isOpen) {
      const result = t.result || t.Result || null;
      const fullPrompt = t.prompt || t.Prompt || '';
      html += `<tr class="task-detail-row"><td colspan="7">`;
      html += `<div class="detail-label">Full Prompt</div><div class="detail-block">${esc(fullPrompt)}</div>`;
      if (result) {
        const isErr = state === 'Failed' || state === 'DeadLetter';
        html += `<div class="detail-label" style="margin-top:10px">${isErr ? 'Error' : 'Result'}</div>`;
        html += `<div class="detail-block">${esc(typeof result === 'object' ? JSON.stringify(result, null, 2) : result)}</div>`;
      }
      html += `</td></tr>`;
    }
  });
  html += '</table>';
  $('taskBody').innerHTML = html;
}

function toggleTask(id) {
  expandedTask[id] = !expandedTask[id];
  renderTasks(window._taskCache);
}

async function cancelTask(id, event) {
  event.stopPropagation();
  try {
    await api(`/tasks/${id}/cancel`, { method: 'POST' });
    toast('Task cancelled');
    await refresh();
  } catch (e) {
    toast('Cancel failed: ' + e.message, true);
  }
}

/* ── Resolve nodeId for a Pending task ──────────────── */
async function findNodeId(workflowId, agentType) {
  try {
    const r = await api(`/dashboard/workflows/${workflowId}/nodes`);
    const nodes = await r.json();
    // Match by agentType and humanApproval flag
    const node = nodes.find(n =>
      (n.agentType || n.AgentType) === agentType && (n.humanApproval ?? n.HumanApproval)
    ) || nodes.find(n => (n.agentType || n.AgentType) === agentType);
    return node ? (node.id || node.Id) : null;
  } catch { return null; }
}

/* ── Approve / Reject / Restart ─────────────────────── */
async function approveTask(taskId, workflowId, agentType, event) {
  event.stopPropagation();
  const btn = event.currentTarget;
  btn.disabled = true; btn.textContent = '⏳…';
  try {
    const nodeId = await findNodeId(workflowId, agentType);
    if (!nodeId) throw new Error('Could not resolve nodeId');
    await api(`/workflows/${workflowId}/nodes/${nodeId}/approve`, { method: 'POST' });
    toast('Approved!');
    await refresh();
  } catch (e) {
    toast('Approve failed: ' + e.message, true);
    btn.disabled = false; btn.textContent = '✓ Approve';
  }
}

async function rejectTask(taskId, workflowId, agentType, event) {
  event.stopPropagation();
  const btn = event.currentTarget;
  btn.disabled = true; btn.textContent = '⏳…';
  try {
    const nodeId = await findNodeId(workflowId, agentType);
    if (!nodeId) throw new Error('Could not resolve nodeId');
    await api(`/workflows/${workflowId}/nodes/${nodeId}/reject`, { method: 'POST' });
    toast('Rejected');
    await refresh();
  } catch (e) {
    toast('Reject failed: ' + e.message, true);
    btn.disabled = false; btn.textContent = '✗ Reject';
  }
}

async function restartTask(id, event) {
  event.stopPropagation();
  const btn = event.currentTarget;
  btn.disabled = true; btn.textContent = '⏳…';
  try {
    await api(`/tasks/${id}/restart`, { method: 'POST' });
    toast('Restarted!');
    await refresh();
  } catch (e) {
    toast('Restart failed: ' + e.message, true);
    btn.disabled = false; btn.textContent = '🔄 Restart';
  }
}

/* ── Filter tabs ────────────────────────────────────── */
$('filterTabs').addEventListener('click', e => {
  const tab = e.target.closest('.filter-tab');
  if (!tab) return;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  taskFilter = tab.dataset.state;
  renderTasks(window._taskCache);
});

/* ── Agent Concurrency ──────────────────────────────── */
function barColor(pct) { return pct < 50 ? 'bar-green' : pct < 80 ? 'bar-yellow' : 'bar-red'; }

function renderAgents(agents) {
  if (!agents || !agents.length) {
    $('agentPanel').innerHTML = '<div class="empty">No agents registered</div>';
    $('cSlots').textContent = '0 / 0';
    return;
  }
  let totalUsed = 0, totalLimit = 0, html = '';
  agents.forEach(a => {
    const pct = a.limit ? Math.round(a.used / a.limit * 100) : 0;
    totalUsed += a.used; totalLimit += a.limit;
    html += `<div class="bar-wrap">
      <div class="bar-label"><span>${esc(a.agent)}</span><span>${a.used} / ${a.limit}</span></div>
      <div class="bar-bg"><div class="bar-fill ${barColor(pct)}" style="width:${pct}%"></div></div>
    </div>`;
  });
  $('agentPanel').innerHTML = html;
  $('cSlots').textContent = `${totalUsed} / ${totalLimit}`;
}

/* ── Workflows ──────────────────────────────────────── */
function renderWorkflows(list) {
  if (!list || !list.length) {
    $('wfPanel').innerHTML = '<div class="empty">No workflows</div>';
    $('cWf').textContent = '0';
    $('wfCount').textContent = '';
    return;
  }
  $('cWf').textContent = list.length;
  $('wfCount').textContent = list.length;

  let html = '<table><tr><th>ID</th><th>Nodes</th><th>Edges</th><th>Tasks</th><th style="width:100px"></th></tr>';
  list.forEach(w => {
    const wid = w.id || w.Id;
    const nodes = w.nodes || w.Nodes || [];
    const edges = w.edges || w.Edges || [];
    const isOpen = expandedWf[wid];
    const taskCount = window._wfTaskCounts[wid] || 0;

    html += `<tr class="clickable">`;
    html += `<td onclick="toggleWf('${esc(wid)}')">${isOpen ? '&#9660;' : '&#9654;'} ${esc(wid)}</td>`;
    html += `<td onclick="toggleWf('${esc(wid)}')">${nodes.length}</td>`;
    html += `<td onclick="toggleWf('${esc(wid)}')">${edges.length}</td>`;
    html += `<td onclick="toggleWf('${esc(wid)}')">${taskCount ? `<span class="badge badge-count">${taskCount}</span>` : '<span class="text-muted">0</span>'}</td>`;
    html += `<td><button class="btn btn-primary btn-sm" onclick="startWorkflow('${esc(wid)}',event)">&#9654; Start</button></td>`;
    html += '</tr>';

    if (isOpen && expandedWf[wid].length) {
      expandedWf[wid].forEach(n => {
        const nid = n.id || n.Id;
        const agent = n.agentType || n.AgentType || '—';
        html += `<tr class="node-row"><td colspan="5">&#8627; <b>${esc(nid)}</b> — ${esc(agent)} (retries:${n.maxRetries ?? n.MaxRetries ?? 0}, approval:${n.humanApproval ?? n.HumanApproval ?? false})</td></tr>`;
      });
    }
  });
  html += '</table>';
  $('wfPanel').innerHTML = html;
}

async function toggleWf(id) {
  if (expandedWf[id]) { delete expandedWf[id]; renderWorkflows(window._wfCache); return; }
  try {
    const r = await api(`/dashboard/workflows/${id}/nodes`);
    expandedWf[id] = await r.json();
  } catch { expandedWf[id] = []; }
  renderWorkflows(window._wfCache);
}

async function startWorkflow(id, event) {
  event.stopPropagation();
  try {
    await api(`/workflows/${id}/start`, { method: 'POST' });
    toast('Started! Workflow ' + id.substring(0, 8));
    await refresh();
  } catch (e) {
    toast('Start failed: ' + e.message, true);
  }
}

/* ── DLQ ────────────────────────────────────────────── */
let _dlqItems = [];

function renderDlq(items) {
  _dlqItems = Array.isArray(items) ? items : [];
  $('cDlq').textContent = _dlqItems.length;

  // Build agent filter dropdown
  const filterEl = $('dlqFilter');
  const currentFilter = filterEl ? filterEl.value : 'all';
  const agents = [...new Set(_dlqItems.map(t => t.agentType || t.AgentType || 'unknown'))];
  if (filterEl) {
    filterEl.innerHTML = '<option value="all">All Agents</option>' +
      agents.map(a => `<option value="${esc(a)}" ${a === currentFilter ? 'selected' : ''}>${esc(a)}</option>`).join('');
  }

  filterDlq();
}

function filterDlq() {
  const filterEl = $('dlqFilter');
  const agent = filterEl ? filterEl.value : 'all';
  const filtered = agent === 'all' ? _dlqItems : _dlqItems.filter(t => (t.agentType || t.AgentType) === agent);

  if (filtered.length) {
    $('dlqBadge').innerHTML = `<span class="badge badge-warn">${_dlqItems.length}</span>`;
    let html = '<table><tr><th style="width:30px"><input type="checkbox" id="dlq-select-all" onchange="toggleDlqSelectAll(this)"></th><th>Task ID</th><th>Agent</th><th>Workflow</th><th>Error</th><th>Failed At</th><th>Actions</th></tr>';
    filtered.forEach(t => {
      const tid = t.id || t.Id || '—';
      const wfId = t.workflowId || t.WorkflowId || '';
      const error = t.error || t.Error || t.result || t.Result || '—';
      const errorShort = error.length > 80 ? error.substring(0, 80) + '…' : error;
      html += `<tr>
        <td><input type="checkbox" class="dlq-check" value="${esc(tid)}"></td>
        <td class="mono">${esc(tid.substring(0, 8))}</td>
        <td><span class="badge" style="background:${getAgentColor(t.agentType||t.AgentType||'dummy')}">${esc(t.agentType || t.AgentType || '—')}</span></td>
        <td class="mono text-muted">${wfId ? esc(wfId.substring(0, 12)) : '—'}</td>
        <td title="${esc(error)}" style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help;color:var(--red)">${esc(errorShort)}</td>
        <td class="text-muted">${relTime(t.updatedAt || t.UpdatedAt || t.createdAt || t.CreatedAt)}</td>
        <td style="display:flex;gap:4px">
          <button class="btn btn-restart btn-sm" onclick="restartTask('${esc(tid)}',event)">🔄 Retry</button>
          <button class="btn btn-sm" style="background:transparent;border:1px solid var(--border);color:var(--text-muted)" onclick="showDlqDetail('${esc(tid)}')">🔍</button>
        </td>
      </tr>`;
    });
    html += '</table>';
    $('dlqBody').innerHTML = html;
  } else {
    $('dlqBadge').textContent = _dlqItems.length > 0 ? '' : '';
    if (_dlqItems.length > 0) {
      $('dlqBadge').innerHTML = `<span class="badge badge-warn">${_dlqItems.length}</span>`;
    }
    $('dlqBody').innerHTML = '<div class="empty">Queue empty ✓</div>';
  }
}

function getAgentColor(agent) {
  const colors = {dummy:'#22a55b',openai:'#3b82f6',claude:'#8b5cf6',copilot:'#14b8a6',webhook:'#f59e0b',crewai:'#ef4444'};
  return colors[agent] || '#6b7280';
}

function toggleDlqSelectAll(el) {
  document.querySelectorAll('.dlq-check').forEach(cb => cb.checked = el.checked);
}

async function restartAllDlq() {
  const checked = [...document.querySelectorAll('.dlq-check:checked')].map(cb => cb.value);
  const ids = checked.length > 0 ? checked : _dlqItems.map(t => t.id || t.Id);
  if (!ids.length) { toast('No items to restart'); return; }
  if (!confirm(`Restart ${ids.length} DLQ task(s)?`)) return;

  let ok = 0, fail = 0;
  for (const id of ids) {
    try {
      await api(`/tasks/${id}/restart`, { method: 'POST' });
      ok++;
    } catch(e) { fail++; }
  }
  toast(`Restarted ${ok}/${ids.length} tasks` + (fail ? ` (${fail} failed)` : ''));
  await refresh();
}

function showDlqDetail(taskId) {
  const task = _dlqItems.find(t => (t.id || t.Id) === taskId);
  if (!task) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `<div style="background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow:auto">
    <h3 style="margin:0 0 16px;color:var(--red)">💀 Dead Letter Task</h3>
    <table style="width:100%;font-size:13px">
      <tr><td style="color:var(--text-muted);padding:4px 12px 4px 0">Task ID</td><td class="mono">${esc(task.id||task.Id||'—')}</td></tr>
      <tr><td style="color:var(--text-muted);padding:4px 12px 4px 0">Agent</td><td>${esc(task.agentType||task.AgentType||'—')}</td></tr>
      <tr><td style="color:var(--text-muted);padding:4px 12px 4px 0">Workflow</td><td class="mono">${esc(task.workflowId||task.WorkflowId||'—')}</td></tr>
      <tr><td style="color:var(--text-muted);padding:4px 12px 4px 0">Prompt</td><td>${esc(task.prompt||task.Prompt||'—')}</td></tr>
      <tr><td style="color:var(--text-muted);padding:4px 12px 4px 0">Failed At</td><td>${relTime(task.updatedAt||task.UpdatedAt||task.createdAt||task.CreatedAt)}</td></tr>
    </table>
    <div style="margin:16px 0 8px;color:var(--text-muted);font-size:12px;font-weight:600">ERROR DETAILS</div>
    <pre style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;color:var(--red);font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow:auto">${esc(task.error||task.Error||task.result||task.Result||'No error details')}</pre>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-sm" style="background:transparent;border:1px solid var(--border);color:var(--text)" onclick="this.closest('div[style*=fixed]').remove()">Close</button>
      <button class="btn btn-restart btn-sm" onclick="restartTask('${esc(task.id||task.Id)}',event);this.closest('div[style*=fixed]').remove()">🔄 Restart Task</button>
    </div>
  </div>`;
  overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

/* ── Prometheus metric parsing (fallback) ───────────── */
function parseMetric(text, name) {
  if (!text) return 0;
  const re = new RegExp(`^${name}\\s+(\\d+(?:\\.\\d+)?)`, 'm');
  const m = text.match(re);
  return m ? parseFloat(m[1]) : 0;
}

/* ── Main refresh loop ──────────────────────────────── */
async function refresh() {
  let ok = true;
  try {
    const [taskRes, agentRes, wfRes, dlqRes] = await Promise.allSettled([
      api('/tasks'),
      api('/dashboard/agents/concurrency'),
      api('/dashboard/workflows'),
      api('/dashboard/dlq')
    ]);

    if (taskRes.status === 'fulfilled') renderTasks(await taskRes.value.json());
    if (agentRes.status === 'fulfilled') renderAgents(await agentRes.value.json());
    if (wfRes.status === 'fulfilled') { window._wfCache = await wfRes.value.json(); renderWorkflows(window._wfCache); }
    if (dlqRes.status === 'fulfilled') renderDlq(await dlqRes.value.json()); else renderDlq([]);

    // Re-render workflows after tasks to pick up task counts
    if (taskRes.status === 'fulfilled' && wfRes.status === 'fulfilled') renderWorkflows(window._wfCache);
  } catch { ok = false; }
  setConnected(ok);
}

function startRefresh() {
  const ms = parseInt($('intervalSel').value);
  if (refreshId) clearInterval(refreshId);
  refreshId = setInterval(refresh, ms);
}

function toggleRefresh() {
  paused = !paused;
  $('toggleBtn').innerHTML = paused ? '&#9654; Resume' : '&#10074;&#10074; Pause';
  if (paused) { clearInterval(refreshId); refreshId = null; } else startRefresh();
}

$('intervalSel').addEventListener('change', () => { if (!paused) startRefresh(); });
refresh();
startRefresh();
</script>
</body>
</html>
