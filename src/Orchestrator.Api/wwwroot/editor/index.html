<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workflow DAG Editor — Flint</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f5f7;--panel:#fff;--border:#dde1e6;--accent:#4f6df5;--accent-hover:#3b57d9;--text:#1a1d23;--muted:#636b79;--radius:8px;--green:#22a55b;--red:#e5484d;--purple:#8b5cf6;--blue:#3b82f6;--amber:#f59e0b;--teal:#14b8a6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#toolbar{width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#toolbar h2{padding:16px 16px 8px;font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.toolbar-section{padding:8px 16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:#f0f0f0}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-block{width:100%}
.toolbar-btns{display:flex;flex-direction:column;gap:6px}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
svg#dag{width:100%;height:100%;cursor:grab}
svg#dag.grabbing{cursor:grabbing}
.grid-bg{fill:url(#gridPattern)}
.node-group{cursor:pointer}
.node-rect{rx:10;ry:10;stroke-width:2;transition:filter .15s}
.node-group:hover .node-rect{filter:drop-shadow(0 2px 8px rgba(0,0,0,.15))}
.node-group.selected .node-rect{stroke-dasharray:5,3;stroke-width:3}
.node-label{font-size:13px;font-weight:600;fill:#fff;pointer-events:none;text-anchor:middle}
.node-sub{font-size:10px;fill:rgba(255,255,255,.8);pointer-events:none;text-anchor:middle}
.node-badge{font-size:9px;fill:#fff;pointer-events:none;text-anchor:middle}
.handle{r:6;fill:#fff;stroke:#999;stroke-width:2;cursor:crosshair;transition:.15s}
.handle:hover{r:8;stroke:var(--accent)}
.edge-path{fill:none;stroke:#aab;stroke-width:2;marker-end:url(#arrowhead)}
.edge-path:hover{stroke:var(--accent);stroke-width:3;cursor:pointer}
.edge-path.selected{stroke:var(--red);stroke-width:3}
#json-panel{width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#json-panel h2{padding:16px 16px 8px;font-size:15px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
#json-output{flex:1;margin:0 16px 8px;padding:10px;font-family:'Cascadia Code','Fira Code',monospace;font-size:11.5px;background:#1e1e2e;color:#cdd6f4;border-radius:var(--radius);overflow:auto;white-space:pre;line-height:1.5;resize:none;border:none}
.json-btns{padding:8px 16px 16px;display:flex;gap:6px;flex-wrap:wrap}
#toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);color:#fff;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .3s;z-index:100}
#toast.show{opacity:1}
#toast.success{background:var(--green)}
#toast.error{background:var(--red)}
.api-url-row{padding:4px 16px 8px;display:flex;gap:4px}
.api-url-row input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50}
.modal{background:var(--panel);border-radius:12px;padding:24px;width:380px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal h3{margin-bottom:16px;font-size:17px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.form-group textarea{resize:vertical;height:60px}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.checkbox-row input{width:auto}
.checkbox-row label{font-size:13px;color:var(--text);margin:0}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.color-dummy{--nc:#22a55b;--ns:#1a8c4a}.color-openai{--nc:#3b82f6;--ns:#2563eb}.color-claude{--nc:#8b5cf6;--ns:#7c3aed}.color-copilot{--nc:#14b8a6;--ns:#0d9488}
.cycle-warn{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--amber);color:#000;padding:6px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;z-index:20;display:none}
.wf-id-row{padding:8px 16px;display:flex;gap:4px;align-items:center}
.wf-id-row label{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
.wf-id-row input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:4px;font-size:12px}
</style>
</head>
<body>

<div id="toolbar">
  <h2>Workflow Editor</h2>
  <div class="wf-id-row">
    <label>Workflow ID</label>
    <input id="wf-id" type="text" value="demo-pipeline" placeholder="workflow-id">
  </div>
  <div class="toolbar-section toolbar-btns">
    <button class="btn btn-primary btn-block" onclick="openNodeModal()">＋ Add Node</button>
    <button class="btn btn-outline btn-block" onclick="connectSelected()">🔗 Connect Selected</button>
    <button class="btn btn-danger btn-block" onclick="deleteSelected()">🗑 Delete Selected</button>
  </div>
  <h2 style="margin-top:8px">Deploy</h2>
  <div class="api-url-row">
    <input id="api-url" type="text" value="" placeholder="API base URL">
  </div>
  <div class="toolbar-section toolbar-btns">
    <button class="btn btn-success btn-block" onclick="deployWorkflow()">🚀 Deploy to Orchestrator</button>
  </div>
  <h2 style="margin-top:8px">Legend</h2>
  <div class="toolbar-section" style="font-size:12px;line-height:2">
    <span style="color:var(--green)">●</span> dummy &nbsp;
    <span style="color:var(--blue)">●</span> openai &nbsp;
    <span style="color:var(--purple)">●</span> claude<br>
    <span style="color:var(--teal)">●</span> copilot &nbsp;
    <span style="background:var(--amber);color:#000;padding:1px 5px;border-radius:3px;font-size:10px">✋</span> approval
  </div>
</div>

<div id="canvas-wrap">
  <div class="cycle-warn" id="cycle-warn">⚠ Cycle detected — workflow must be a DAG</div>
  <svg id="dag" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#dde1e6" stroke-width=".5"/>
      </pattern>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#aab"/>
      </marker>
    </defs>
    <rect class="grid-bg" width="5000" height="5000" x="-2500" y="-2500"/>
    <g id="edges-layer"></g>
    <g id="nodes-layer"></g>
  </svg>
</div>

<div id="json-panel">
  <h2>JSON Output</h2>
  <pre id="json-output">{}</pre>
  <div class="json-btns">
    <button class="btn btn-outline btn-sm" onclick="copyJson()">📋 Copy JSON</button>
    <button class="btn btn-outline btn-sm" onclick="importJson()">📥 Import JSON</button>
  </div>
</div>

<div id="toast"></div>

<script>
const W=160,H=64,HANDLE_R=6;
const COLORS={dummy:['#22a55b','#1a8c4a'],openai:['#3b82f6','#2563eb'],claude:['#8b5cf6','#7c3aed'],copilot:['#14b8a6','#0d9488']};
const ICONS={dummy:'⚙',openai:'🤖',claude:'🧠',copilot:'✈'};

let nodes=[],edges=[],selectedNodeIds=new Set(),selectedEdgeIdx=-1,nextId=1;
let dragNode=null,dragOffX=0,dragOffY=0;
let linkDrag=null; // {fromId, startX, startY}
const svg=document.getElementById('dag');
const nodesLayer=document.getElementById('nodes-layer');
const edgesLayer=document.getElementById('edges-layer');
let viewBox={x:0,y:0,w:900,h:600};
let isPanning=false,panStart={x:0,y:0};

// Default API url to same origin
document.getElementById('api-url').value=location.origin||'http://localhost:5156';

function updateViewBox(){svg.setAttribute('viewBox',`${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`)}
updateViewBox();

// Pan & zoom
svg.addEventListener('mousedown',e=>{
  if(e.target===svg||e.target.classList.contains('grid-bg')){
    if(!e.shiftKey){selectedNodeIds.clear();selectedEdgeIdx=-1;renderAll()}
    isPanning=true;panStart={x:e.clientX,y:e.clientY};svg.classList.add('grabbing');
  }
});
svg.addEventListener('mousemove',e=>{
  if(isPanning){
    const dx=(e.clientX-panStart.x)*(viewBox.w/svg.clientWidth);
    const dy=(e.clientY-panStart.y)*(viewBox.h/svg.clientHeight);
    viewBox.x-=dx;viewBox.y-=dy;panStart={x:e.clientX,y:e.clientY};updateViewBox();
  }
  if(linkDrag){renderTempEdge(e)}
  if(dragNode){
    const r=svg.getBoundingClientRect();
    const sx=(e.clientX-r.left)/r.width*viewBox.w+viewBox.x;
    const sy=(e.clientY-r.top)/r.height*viewBox.h+viewBox.y;
    dragNode.x=sx-dragOffX;dragNode.y=sy-dragOffY;renderAll();
  }
});
svg.addEventListener('mouseup',()=>{isPanning=false;svg.classList.remove('grabbing');dragNode=null;
  if(linkDrag){removeTempEdge();linkDrag=null}});
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const scale=e.deltaY>0?1.1:0.9;
  const r=svg.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*viewBox.w+viewBox.x;
  const my=(e.clientY-r.top)/r.height*viewBox.h+viewBox.y;
  viewBox.w*=scale;viewBox.h*=scale;
  viewBox.x=mx-(mx-viewBox.x)*scale;viewBox.y=my-(my-viewBox.y)*scale;
  updateViewBox();
},{passive:false});

function svgPt(e){const r=svg.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*viewBox.w+viewBox.x,y:(e.clientY-r.top)/r.height*viewBox.h+viewBox.y}}

function addNode(data){
  const n={id:data.id||`node-${nextId++}`,agentType:data.agentType||'dummy',prompt:data.prompt||'',approval:!!data.approval,maxRetries:data.maxRetries??3,deadLetter:data.deadLetter!==false,x:data.x??viewBox.x+viewBox.w/2-W/2,y:data.y??viewBox.y+viewBox.h/2-H/2};
  if(nodes.find(nd=>nd.id===n.id)){toast('Node ID already exists','error');return null}
  nodes.push(n);renderAll();return n;
}

function addEdge(from,to){
  if(from===to){toast('Cannot connect node to itself','error');return false}
  if(edges.find(e=>e.from===from&&e.to===to)){toast('Edge already exists','error');return false}
  edges.push({from,to});
  if(hasCycle()){edges.pop();toast('Adding this edge creates a cycle','error');return false}
  renderAll();return true;
}

function hasCycle(){
  const adj={};nodes.forEach(n=>adj[n.id]=[]);
  edges.forEach(e=>{if(adj[e.from])adj[e.from].push(e.to)});
  const visited=new Set(),stack=new Set();
  function dfs(u){
    if(stack.has(u))return true;if(visited.has(u))return false;
    visited.add(u);stack.add(u);
    for(const v of(adj[u]||[])){if(dfs(v))return true}
    stack.delete(u);return false;
  }
  return nodes.some(n=>dfs(n.id));
}

function deleteSelected(){
  if(selectedEdgeIdx>=0){edges.splice(selectedEdgeIdx,1);selectedEdgeIdx=-1;renderAll();return}
  if(selectedNodeIds.size===0)return;
  const ids=new Set(selectedNodeIds);
  nodes=nodes.filter(n=>!ids.has(n.id));
  edges=edges.filter(e=>!ids.has(e.from)&&!ids.has(e.to));
  selectedNodeIds.clear();renderAll();
}

function connectSelected(){
  const sel=[...selectedNodeIds];
  if(sel.length!==2){toast('Select exactly 2 nodes','error');return}
  addEdge(sel[0],sel[1]);
}

// Render
function renderAll(){
  renderNodes();renderEdges();updateJson();
  document.getElementById('cycle-warn').style.display=hasCycle()?'block':'none';
}

function renderNodes(){
  nodesLayer.innerHTML='';
  nodes.forEach(n=>{
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class',`node-group${selectedNodeIds.has(n.id)?' selected':''}`);
    g.setAttribute('transform',`translate(${n.x},${n.y})`);

    const c=COLORS[n.agentType]||COLORS.dummy;
    const rect=el('rect',{x:0,y:0,width:W,height:H,fill:c[0],stroke:c[1],class:'node-rect'});
    g.appendChild(rect);

    g.appendChild(txt(W/2,22,`${ICONS[n.agentType]||'⚙'} ${n.id}`,'node-label'));
    g.appendChild(txt(W/2,40,n.agentType,'node-sub'));

    if(n.approval){
      const badge=el('rect',{x:W-30,y:2,width:26,height:16,rx:4,fill:'#f59e0b'});
      g.appendChild(badge);
      g.appendChild(txt(W-17,13,'✋','node-badge'));
    }
    // Input handle (left)
    const hi=el('circle',{cx:0,cy:H/2,class:'handle input-handle','data-node':n.id});
    hi.addEventListener('mouseup',e=>{e.stopPropagation();if(linkDrag&&linkDrag.fromId!==n.id){addEdge(linkDrag.fromId,n.id);linkDrag=null;removeTempEdge()}});
    g.appendChild(hi);
    // Output handle (right)
    const ho=el('circle',{cx:W,cy:H/2,class:'handle output-handle','data-node':n.id});
    ho.addEventListener('mousedown',e=>{
      e.stopPropagation();
      linkDrag={fromId:n.id,startX:n.x+W,startY:n.y+H/2};
    });
    g.appendChild(ho);

    // Click to select
    g.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('handle'))return;
      e.stopPropagation();
      if(e.shiftKey){
        selectedNodeIds.has(n.id)?selectedNodeIds.delete(n.id):selectedNodeIds.add(n.id);
      } else if(!selectedNodeIds.has(n.id)){
        selectedNodeIds.clear();selectedNodeIds.add(n.id);
      }
      selectedEdgeIdx=-1;
      dragNode=n;const pt=svgPt(e);dragOffX=pt.x-n.x;dragOffY=pt.y-n.y;
      renderAll();
    });
    // Double-click to edit
    g.addEventListener('dblclick',e=>{e.stopPropagation();openNodeModal(n)});

    nodesLayer.appendChild(g);
  });
}

function renderEdges(){
  edgesLayer.innerHTML='';
  edges.forEach((e,i)=>{
    const fn=nodes.find(n=>n.id===e.from),tn=nodes.find(n=>n.id===e.to);
    if(!fn||!tn)return;
    const x1=fn.x+W,y1=fn.y+H/2,x2=tn.x,y2=tn.y+H/2;
    const dx=Math.abs(x2-x1)/2;
    const d=`M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}`;
    const path=el('path',{d,class:`edge-path${i===selectedEdgeIdx?' selected':''}`});
    path.addEventListener('click',ev=>{ev.stopPropagation();selectedEdgeIdx=i;selectedNodeIds.clear();renderAll()});
    edgesLayer.appendChild(path);
  });
}

function renderTempEdge(e){
  removeTempEdge();
  if(!linkDrag)return;
  const pt=svgPt(e);
  const dx=Math.abs(pt.x-linkDrag.startX)/2;
  const d=`M${linkDrag.startX},${linkDrag.startY} C${linkDrag.startX+dx},${linkDrag.startY} ${pt.x-dx},${pt.y} ${pt.x},${pt.y}`;
  const p=el('path',{d,fill:'none',stroke:'#aab',class:'temp-edge','stroke-width':2,'stroke-dasharray':'6,4'});
  edgesLayer.appendChild(p);
}
function removeTempEdge(){edgesLayer.querySelectorAll('.temp-edge').forEach(p=>p.remove())}

// JSON
function buildJson(){
  return{
    Id:document.getElementById('wf-id').value||'workflow-1',
    Nodes:nodes.map(n=>({Id:n.id,AgentType:n.agentType,PromptTemplate:n.prompt,HumanApproval:n.approval,MaxRetries:n.maxRetries,DeadLetterOnFailure:n.deadLetter})),
    Edges:edges.map(e=>({FromNodeId:e.from,ToNodeId:e.to,Condition:''}))
  };
}
function updateJson(){document.getElementById('json-output').textContent=JSON.stringify(buildJson(),null,2)}
document.getElementById('wf-id').addEventListener('input',updateJson);

function copyJson(){
  navigator.clipboard.writeText(JSON.stringify(buildJson(),null,2)).then(()=>toast('JSON copied!','success'));
}

function importJson(){
  const raw=prompt('Paste workflow JSON:');
  if(!raw)return;
  try{
    const d=JSON.parse(raw);
    nodes=[];edges=[];selectedNodeIds.clear();selectedEdgeIdx=-1;nextId=1;
    if(d.Id)document.getElementById('wf-id').value=d.Id;
    (d.Nodes||[]).forEach((n,i)=>{
      nodes.push({id:n.Id,agentType:n.AgentType||'dummy',prompt:n.PromptTemplate||'',approval:!!n.HumanApproval,maxRetries:n.MaxRetries??3,deadLetter:n.DeadLetterOnFailure!==false,x:80+i*200,y:100+Math.sin(i)*60});
    });
    (d.Edges||[]).forEach(e=>edges.push({from:e.FromNodeId,to:e.ToNodeId}));
    autoLayout();renderAll();toast('Workflow imported!','success');
  }catch(err){toast('Invalid JSON: '+err.message,'error')}
}

// Deploy
async function deployWorkflow(){
  const url=(document.getElementById('api-url').value||location.origin).replace(/\/$/,'');
  const body=buildJson();
  try{
    const res=await fetch(url+'/workflows',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(res.ok){toast('Workflow deployed! ✅','success')}
    else{const e=await res.json().catch(()=>({}));toast('Deploy failed: '+(e.error||res.statusText),'error')}
  }catch(err){toast('Network error: '+err.message,'error')}
}

// Auto-layout (topological)
function autoLayout(){
  const indeg={};nodes.forEach(n=>indeg[n.id]=0);
  edges.forEach(e=>{if(indeg[e.to]!==undefined)indeg[e.to]++});
  const q=nodes.filter(n=>indeg[n.id]===0).map(n=>n.id);
  const levels={};let lv=0;
  const visited=new Set();
  while(q.length){
    const size=q.length;
    for(let i=0;i<size;i++){
      const u=q.shift();if(visited.has(u))continue;visited.add(u);
      levels[u]=lv;
      edges.filter(e=>e.from===u).forEach(e=>{indeg[e.to]--;if(indeg[e.to]===0)q.push(e.to)});
    }
    lv++;
  }
  // Place unvisited nodes
  nodes.filter(n=>!visited.has(n.id)).forEach(n=>{levels[n.id]=lv++});
  // Assign positions
  const cols={};
  nodes.forEach(n=>{const l=levels[n.id]||0;if(!cols[l])cols[l]=0;n.x=80+l*220;n.y=60+cols[l]*100;cols[l]++});
}

// Modal
function openNodeModal(existing){
  const isEdit=!!existing;
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal">
    <h3>${isEdit?'Edit Node':'Add Node'}</h3>
    <div class="form-group"><label>Node ID</label><input id="m-id" value="${isEdit?existing.id:('node-'+nextId)}" ${isEdit?'disabled':''}></div>
    <div class="form-group"><label>Agent Type</label>
      <select id="m-agent"><option value="dummy">dummy</option><option value="openai">openai</option><option value="claude">claude</option><option value="copilot">copilot</option></select></div>
    <div class="form-group"><label>Prompt Template</label><textarea id="m-prompt">${isEdit?esc(existing.prompt):''}</textarea></div>
    <div class="checkbox-row"><input type="checkbox" id="m-approval" ${isEdit&&existing.approval?'checked':''}><label for="m-approval">Human Approval</label></div>
    <div class="form-group"><label>Max Retries</label><input type="number" id="m-retries" min="0" max="10" value="${isEdit?existing.maxRetries:3}"></div>
    <div class="checkbox-row"><input type="checkbox" id="m-dlq" ${!isEdit||existing.deadLetter?'checked':''}><label for="m-dlq">Dead Letter on Failure</label></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="m-cancel">Cancel</button>
      <button class="btn btn-primary" id="m-ok">${isEdit?'Update':'Add'}</button>
    </div></div>`;
  document.body.appendChild(overlay);
  if(isEdit)overlay.querySelector('#m-agent').value=existing.agentType;

  overlay.querySelector('#m-cancel').onclick=()=>overlay.remove();
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove()});
  overlay.querySelector('#m-ok').onclick=()=>{
    const id=overlay.querySelector('#m-id').value.trim();
    const agentType=overlay.querySelector('#m-agent').value;
    const prompt=overlay.querySelector('#m-prompt').value;
    const approval=overlay.querySelector('#m-approval').checked;
    const maxRetries=parseInt(overlay.querySelector('#m-retries').value)||3;
    const deadLetter=overlay.querySelector('#m-dlq').checked;
    if(!id){toast('Node ID is required','error');return}
    if(isEdit){
      existing.agentType=agentType;existing.prompt=prompt;existing.approval=approval;
      existing.maxRetries=maxRetries;existing.deadLetter=deadLetter;renderAll();
    }else{addNode({id,agentType,prompt,approval,maxRetries,deadLetter})}
    overlay.remove();
  };
}

// Toast
function toast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;t.className=`show ${type}`;
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.className='',2500);
}

// SVG helpers
function el(tag,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',tag);for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);return e}
function txt(x,y,text,cls){const t=el('text',{x,y,class:cls});t.textContent=text;return t}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='Delete'||e.key==='Backspace')deleteSelected();
  if(e.key==='a'&&(e.ctrlKey||e.metaKey)){e.preventDefault();nodes.forEach(n=>selectedNodeIds.add(n.id));renderAll()}
});

// Demo workflow
(function loadDemo(){
  addNode({id:'generate-code',agentType:'openai',prompt:'Generate a REST API endpoint for {{feature}}',x:80,y:100,maxRetries:3,deadLetter:true});
  addNode({id:'lint-check',agentType:'dummy',prompt:'Run linter on generated code',x:300,y:60,maxRetries:2,deadLetter:true});
  addNode({id:'run-tests',agentType:'dummy',prompt:'Execute unit tests',x:300,y:180,maxRetries:2,deadLetter:true});
  addNode({id:'review',agentType:'claude',prompt:'Review code quality and suggest improvements',x:530,y:100,approval:true,maxRetries:1,deadLetter:true});
  addNode({id:'deploy',agentType:'copilot',prompt:'Create deployment PR',x:760,y:100,maxRetries:1,deadLetter:true});
  edges.push({from:'generate-code',to:'lint-check'});
  edges.push({from:'generate-code',to:'run-tests'});
  edges.push({from:'lint-check',to:'review'});
  edges.push({from:'run-tests',to:'review'});
  edges.push({from:'review',to:'deploy'});
  document.getElementById('wf-id').value='demo-pipeline';
  renderAll();
})();
</script>
