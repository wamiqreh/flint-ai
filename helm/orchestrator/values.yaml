image:
  repository: flint-ai
  tag: local
  pullPolicy: IfNotPresent

api:
  replicas: 2
  servicePort: 80
  containerPort: 5156

worker:
  replicas: 2

env:
  REDIS_URL: "redis://redis:6379"
  POSTGRES_URL: "postgresql://flint:flint@postgres:5432/flint"
  REDIS_CONSUMER_GROUP: "flint-group"
  WORKER_COUNT: "4"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"

secrets:
  OPENAI_API_KEY: ""
  CLAUDE_API_KEY: ""
  COPILOT_API_KEY: ""
  FLINT_API_KEY: ""

monitoring:
  serviceMonitor:
    enabled: false
    interval: "15s"
    scrapeTimeout: "10s"
    additionalLabels: {}
  prometheusRule:
    enabled: false
    additionalLabels: {}
    queueBacklogThreshold: 100
    failureRateThreshold: 0.1
    dlqHourlyThreshold: 10
