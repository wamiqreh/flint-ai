apiVersion: v1
kind: Secret
metadata:
  name: {{ include "orchestrator.fullname" . }}-secret
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.secrets.OPENAI_API_KEY | quote }}
  CLAUDE_API_KEY: {{ .Values.secrets.CLAUDE_API_KEY | quote }}
  COPILOT_API_KEY: {{ .Values.secrets.COPILOT_API_KEY | quote }}
  ORCHESTRATOR_API_KEY: {{ .Values.secrets.ORCHESTRATOR_API_KEY | quote }}
