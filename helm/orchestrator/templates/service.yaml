apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestrator.fullname" . }}-api
spec:
  type: ClusterIP
  selector:
    app: {{ include "orchestrator.fullname" . }}-api
  ports:
    - port: {{ .Values.api.servicePort }}
      targetPort: {{ .Values.api.containerPort }}
      protocol: TCP
      name: http
