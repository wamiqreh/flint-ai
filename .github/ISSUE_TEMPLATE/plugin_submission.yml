name: "Plugin Submission"
description: "Submit a community plugin (agent adapter or workflow template) for listing"
title: "[Plugin]: "
labels: ["plugin", "community"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for building a plugin for Flint! 🎉
        Submit your plugin here so it can be reviewed and listed in our community plugin directory.

  - type: input
    id: plugin-name
    attributes:
      label: Plugin Name
      description: The name of your plugin.
      placeholder: "agent-queue-ollama-adapter"
    validations:
      required: true

  - type: dropdown
    id: plugin-type
    attributes:
      label: Plugin Type
      description: What type of plugin is this?
      options:
        - Agent Adapter
        - Workflow Template
        - Queue Backend
        - Persistence Provider
        - Monitoring Integration
        - SDK Extension
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        A clear description of what your plugin does, why it's useful, and who it's for.
      placeholder: |
        This plugin adds an Ollama agent adapter that allows the orchestrator
        to execute tasks on locally-hosted LLMs via the Ollama API. It supports
        model selection, streaming responses, and custom system prompts.
    validations:
      required: true

  - type: input
    id: repository-url
    attributes:
      label: Repository URL
      description: Link to the plugin's source code repository.
      placeholder: "https://github.com/your-username/agent-queue-ollama-adapter"
    validations:
      required: true

  - type: input
    id: nuget-package
    attributes:
      label: NuGet Package (if published)
      description: NuGet package name if the plugin is published.
      placeholder: "Flint.AI.Ollama"
    validations:
      required: false

  - type: textarea
    id: installation
    attributes:
      label: Installation Instructions
      description: How do users install and configure your plugin?
      placeholder: |
        ```bash
        dotnet add package Flint.AI.Ollama
        ```

        Then register in `Program.cs`:
        ```csharp
        builder.Services.AddOllamaAgent(options => {
            options.BaseUrl = "http://localhost:11434";
            options.Model = "llama3";
        });
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: |
        Which versions of Flint is this plugin compatible with?
        Any specific requirements (e.g., external services, API keys)?
      placeholder: |
        - Compatible with Flint v1.0+
        - Requires Ollama running locally or accessible via network
        - No API keys required
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Plugin Status
      description: What is the current status of your plugin?
      options:
        - "Alpha — early development, may have bugs"
        - "Beta — mostly stable, needs more testing"
        - "Stable — production-ready"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: The plugin has a README with usage documentation.
          required: true
        - label: The plugin has tests.
          required: false
        - label: The plugin follows the project's coding conventions.
          required: false
        - label: I am willing to maintain this plugin.
          required: true
        - label: The plugin is licensed under an OSI-approved license.
          required: true
