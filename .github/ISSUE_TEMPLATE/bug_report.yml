name: "Bug Report"
description: "Report a bug to help us improve Flint"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out this form as completely as possible so we can investigate and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start the orchestrator with `dotnet run --project src/Orchestrator.Api`
        2. Submit a task via `POST /tasks` with payload: ...
        3. Wait for task to be picked up by the worker
        4. Observe the error in logs
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "The task should have been processed successfully and returned a result."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: "The task was stuck in 'Processing' state and eventually timed out after 5 minutes."
    validations:
      required: true

  - type: dropdown
    id: queue-backend
    attributes:
      label: Queue Backend
      description: Which queue backend are you using?
      options:
        - In-Memory
        - Redis Streams
        - Kafka
        - AWS SQS
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: "e.g., Windows 11, Ubuntu 22.04, macOS 14 Sonoma"
      placeholder: "Ubuntu 22.04"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET Version
      description: "Output of `dotnet --version`"
      placeholder: "8.0.300"
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker Version
      description: "Output of `docker --version` (if applicable)"
      placeholder: "Docker 24.0.7"
    validations:
      required: false

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: "Version of the Python/C# SDK if using one"
      placeholder: "Python SDK 0.1.0"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs & Screenshots
      description: |
        Paste any relevant log output, error messages, or screenshots.
        Tip: You can attach images by clicking this area to highlight it and then dragging files in.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem (configuration, workarounds tried, etc.)
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this is not a duplicate.
          required: true
        - label: I have included steps to reproduce the bug.
          required: true
