name: Publish Python SDK to PyPI

on:
  push:
    tags: ["sdk-python-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.1)"
        required: true
        type: string

defaults:
  run:
    working-directory: .

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine setuptools-scm

      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i 's/dynamic = \["version"\]/version = "'$VERSION'"/' pyproject.toml
          echo "Set version to $VERSION"

      - name: Build package
        run: python -m build

      - name: Verify package
        run: twine check dist/*

      - name: Test install and import
        run: |
          pip install dist/*.whl
          python -c "from flint_ai.client import OrchestratorClient, AsyncOrchestratorClient; print('Client import OK')"
          python -c "from flint_ai.models import SubmitTaskRequest, TaskResponse; print('Models import OK')"

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
