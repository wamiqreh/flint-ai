name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      run_integration:
        description: 'Run integration tests'
        required: true
        default: 'true'

jobs:
  integration:
    if: ${{ github.event.inputs.run_integration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Compose
        uses: docker/compose-action@v2
        with:
          compose-file: docker-compose.integration.yml
      - name: Start services
        run: docker-compose -f docker-compose.integration.yml up -d
      - name: Wait for Postgres
        run: |
          docker-compose -f docker-compose.integration.yml exec -T postgres bash -lc 'until pg_isready -U postgres; do sleep 1; done; echo postgres ready'
      - name: Check Redis
        run: docker-compose -f docker-compose.integration.yml exec -T redis redis-cli ping
      - name: Build solution
        run: dotnet build --configuration Release
      - name: Run LoadRunner (smoke)
        run: dotnet run --project tools/LoadRunner --configuration Release
