name: CI - Smoke Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run smoke test (in-memory)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tools\smoke-test.ps1
